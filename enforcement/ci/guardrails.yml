# TEMPLATE — agent-agnostic CI backstop. Fill every {{PLACEHOLDER}} and the ⟨FILL⟩ note below.
# Installs to `.github/workflows/guardrails.yml` in the target repo.
#
# This is the machine that does not get tired: it re-checks on every PR what the
# agent loop is supposed to have already enforced, so a skipped review can't ship.
#
# MAKE IT A REQUIRED CHECK: in the repo's branch-protection rules for the default
# branch, mark this workflow's job ("guardrails") as a required status check and
# require branches to be up to date before merging. Without branch protection this
# file only reports — it does not block. That protection is the whole point.

name: guardrails

on:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history, for diffing against the base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⟨FILL: swap for your runtime — actions/setup-node, setup-python, setup-go, … ⟩
      - name: Set up runtime
        uses: actions/setup-node@v4
        with:
          node-version: "{{NODE_VERSION}}" # e.g. "20"

      - name: Install dependencies
        run: "{{INSTALL_CMD}}" # e.g. npm ci

      - name: Lint
        run: "{{LINT_CMD}}" # e.g. npm run lint

      - name: Type check
        run: "{{TYPE_CMD}}" # e.g. npm run typecheck

      - name: Test
        run: "{{TEST_CMD}}" # e.g. npm test

      # Hard-line checks are machine-readable: one manifest (enforcement/hard-lines.json —
      # one entry per line in governance/13, added via /hardline), one engine, called
      # identically by pre-commit, CI, and /gate. No hand-copied grep lists to drift.
      - name: Hard lines — forbidden patterns in the PR diff
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          node scripts/check-hard-lines.mjs --range "origin/${{ github.base_ref }}...HEAD" --manifest enforcement/hard-lines.json

      - name: Hard lines — fixtures prove every pattern fires
        run: node scripts/check-hard-lines.mjs --self-test --manifest enforcement/hard-lines.json

      - name: Hard lines — every line in governance/13 has a wired check
        run: node scripts/check-hard-lines.mjs --coverage --doc governance/13-domain-hard-lines.md --manifest enforcement/hard-lines.json

      - name: Ledger
        run: node scripts/validate-ledger.mjs
